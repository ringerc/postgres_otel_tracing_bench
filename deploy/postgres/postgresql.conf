# postgresql.conf for the bench's postgres-otel-bench image.
#
# Generated by deploy/postgres/init.sh on first boot by appending to
# initdb's default postgresql.conf --- the entries here override
# defaults of the same name (postgres takes the LAST setting for any
# duplicated GUC).

# ----- bind / accept connections -------------------------------------------
listen_addresses = '*'
# tcp_keepalives_* defaults are fine; toxiproxy holds the keepalive in
# our setup.

# ----- shared preload --------------------------------------------------------
#
# Load order matters:
#
#   * otel                  --- the API/infrastructure module. Publishes
#                               the OtelTracingApi rendezvous variable
#                               that the next two consume.
#   * otel_postgres_tracing --- the query-instrumentation consumer that
#                               produces statement spans via executor
#                               hooks.
#   * postgres_otel_tracing_demo --- the Rust extension that owns the
#                               actual opentelemetry-rust SDK pipeline
#                               and ships spans via OTLP/gRPC. Driven
#                               by the OTEL_* env vars passed to the
#                               container.
#   * pg_stat_statements    --- needed for the bench's per-cell
#                               postgres-side counter snapshots.
shared_preload_libraries = 'otel,otel_postgres_tracing,postgres_otel_tracing_demo,pg_stat_statements'

# ----- protocol headers (PR #3) ----------------------------------------------
# Enables the 'M' (RequestHeaders) wire message Mode 4 uses. Off by
# default in core; on here so the bench's Mode 4 works.
protocol_headers = on

# ----- contrib/otel --------------------------------------------------------
# Emit a span for every query, not only those carrying a client-supplied
# traceparent. Makes the bench's "untraced" Mode 0 still show up in
# Jaeger so the comparison views work even for the baseline.
otel.trace_all_queries = on

# ----- logging --------------------------------------------------------------
# stderr so `docker compose logs postgres` shows them.
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning

# ----- bench-friendly tunables -----------------------------------------------
# pg_stat_statements settings tuned for the bench's tiny-query workload.
pg_stat_statements.max = 10000
pg_stat_statements.track = all
