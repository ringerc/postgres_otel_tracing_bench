# pg_hba.conf for the bench image.
#
# Trust everywhere --- this image is for an isolated demo container,
# NOT a production deployment. Toxiproxy lives in the same compose
# network and is the only thing reaching :5432 in the published demo.

# TYPE  DATABASE  USER      ADDRESS         METHOD
local   all       all                       trust
host    all       all       127.0.0.1/32    trust
host    all       all       ::1/128         trust
# compose's docker network gateway is in the 172.x or fc00::/7 range
# depending on platform; trust the docker bridge subnet wholesale.
host    all       all       0.0.0.0/0       trust
host    all       all       ::/0            trust
